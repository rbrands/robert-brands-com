name: Check for Package Updates

on:
  schedule:
    # Jeden Montag um 06:00 UTC (07:00 MEZ / 08:00 MESZ)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Manueller Trigger über GitHub UI

jobs:
  check-updates:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Check for outdated packages
      id: outdated
      run: |
        echo "Checking for outdated NuGet packages..."
        dotnet list package --outdated > outdated.txt 2>&1 || true
        cat outdated.txt
        
        # Check if there are any outdated packages
        if grep -q "Neueste" outdated.txt || grep -q "Latest" outdated.txt; then
          echo "has_updates=true" >> $GITHUB_OUTPUT
        else
          echo "has_updates=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Create Issue with Update List
      if: steps.outdated.outputs.has_updates == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const outdatedOutput = fs.readFileSync('outdated.txt', 'utf8');
          
          // Parse output and create formatted issue body
          const issueBody = `## 📦 NuGet Package Updates verfügbar
          
Es wurden NuGet Package-Updates gefunden beim wöchentlichen Check.

### Gefundene Updates

\`\`\`
${outdatedOutput}
\`\`\`

### Nächste Schritte

1. Überprüfen Sie die Updates
2. Entscheiden Sie, welche Updates Sie durchführen möchten
3. Erstellen Sie einen Branch und führen Sie Updates durch:
   \`\`\`bash
   dotnet add package <PackageName> --version <Version>
   \`\`\`
4. Testen Sie lokal
5. Erstellen Sie einen PR

### Automatisch generiert

Dieser Check läuft jeden Montag um 07:00 MEZ / 08:00 MESZ.
Manuelle Ausführung: Actions → "Check for Package Updates" → Run workflow

---
**Generiert:** ${new Date().toISOString()}
          `;
          
          // Check if there's already an open issue
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'package-updates,automated'
          });
          
          // Close old automated update issues
          for (const issue of issues.data) {
            if (issue.title.includes('📦 NuGet Package Updates verfügbar')) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              console.log(`Closed old issue #${issue.number}`);
            }
          }
          
          // Create new issue
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '📦 NuGet Package Updates verfügbar - ' + new Date().toISOString().split('T')[0],
            body: issueBody,
            labels: ['package-updates', 'automated', 'dependencies']
          });
    
    - name: No updates found
      if: steps.outdated.outputs.has_updates == 'false'
      run: |
        echo "✅ Alle Packages sind aktuell - keine Updates verfügbar!"
